name: Run Python Script

on:
  push:
    branches: [ "master" ]
  workflow_dispatch:

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v6
      - name: Show workspace path
        run: echo $GITHUB_WORKSPACE

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run script
        run: python test.py
    
